services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    volumes:
      - ./db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  server:
    build: ./server
    restart: always
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - db
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  client:
    build: ./client
    restart: always
    env_file: .env
    ports:
      - '80:80'
    depends_on:
      - server
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

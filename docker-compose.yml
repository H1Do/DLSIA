services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    volumes:
      - ./db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/h1do/dlsia-server:latest
    restart: always
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  client:
    image: ghcr.io/h1do/dlsia-client:latest
    restart: always
    env_file: .env
    ports:
      - '80:80'
    depends_on:
      - server
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
